apiVersion: v1
kind: Service
metadata:
  name: {{ include "bigipreport.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "bigipreport.labels" . | nindent 4 }}
spec:
  type: {{ (.Values.frontend.service | default dict).type | default "ClusterIP" }}
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: http
  selector:
    {{- include "bigipreport.frontendSelectorLabels" . | nindent 4 }}
