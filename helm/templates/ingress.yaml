{{- if .Values.ingress.enabled }}
{{- $tlsSecret := include "bigipreport.ingressTlsSecretName" . }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "bigipreport.fullname" . }}-ingress
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "bigipreport.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/ignore-healthcheck: "true"
  {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- if and .Values.ingress.tls $tlsSecret }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ $tlsSecret | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "bigipreport.fullname" . }}
                port:
                  number: 80
{{- end }}
