apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bigipreport.fullname" . }}-frontend
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "bigipreport.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      {{- include "bigipreport.frontendSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bigipreport.labels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        {{- include "bigipreport.frontendPodSecurityContext" . | nindent 8 }}
      containers:
      - name: frontend
        image: {{ include "bigipreport.image" (dict "repository" .Values.frontend.image.repository "tag" .Values.frontend.image.tag "appVersion" .Chart.AppVersion) | quote }}
        ports:
        - name: http
          containerPort: 8080
        resources:
          {{- toYaml .Values.frontend.resources | nindent 10 }}
        volumeMounts:
          - name: bigipreport-underlay
            mountPath: /usr/share/nginx/html/json
            readOnly: true
          - name: tmp
            mountPath: /tmp
          - name: var-log-nginx
            mountPath: /var/log/nginx
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 3
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
        securityContext:
          {{- include "bigipreport.frontendContainerSecurityContext" . | nindent 10 }}
      volumes:
        - name: bigipreport-underlay
          persistentVolumeClaim:
            claimName: {{ include "bigipreport.pvcName" . }}
        - name: tmp
          emptyDir: {}
        - name: var-log-nginx
          emptyDir: {}
