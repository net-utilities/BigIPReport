apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "bigipreport.fullname" . }}-data-collector
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "bigipreport.labels" . | nindent 4 }}
    app.kubernetes.io/component: data-collector
spec:
  schedule: {{ .Values.dataCollector.schedule | quote }}
  concurrencyPolicy: {{ .Values.dataCollector.concurrencyPolicy }}
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: {{ .Values.dataCollector.failedJobsHistoryLimit }}
  startingDeadlineSeconds: 300
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ .Values.dataCollector.activeDeadlineSeconds }}
      backoffLimit: {{ .Values.dataCollector.backoffLimit }}
      template:
        metadata:
          labels:
            {{- include "bigipreport.labels" . | nindent 12 }}
            app.kubernetes.io/component: data-collector
        spec:
          automountServiceAccountToken: false
          enableServiceLinks: false
          hostname: {{ include "bigipreport.fullname" . }}-data-collector
          securityContext:
            {{- include "bigipreport.dataCollectorPodSecurityContext" . | nindent 12 }}
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      {{- include "bigipreport.frontendSelectorLabels" . | nindent 22 }}
                  topologyKey: kubernetes.io/hostname
          containers:
          - name: bigipreport
            image: {{ include "bigipreport.image" (dict "repository" .Values.dataCollector.image.repository "tag" .Values.dataCollector.image.tag "appVersion" .Chart.AppVersion) | quote }}
            resources:
              {{- toYaml .Values.dataCollector.resources | nindent 14 }}
            env:
            - name: F5_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.dataCollector.secret.name | quote }}
                  key: F5_USERNAME
            - name: F5_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.dataCollector.secret.name | quote }}
                  key: F5_PASSWORD
            - name: REPORT_ROOT
              value: /opt/bigipreport/
            - name: HOME
              value: /tmp
            - name: TMPDIR
              value: /tmp
            volumeMounts:
              - name: bigipreport-underlay
                mountPath: /opt/bigipreport/json
              - name: configuration
                mountPath: /opt/bigipreport/data-collector/bigipreportconfig.xml
                subPath: bigipreportconfig.xml
                readOnly: true
              - name: tmp
                mountPath: /tmp
            securityContext:
              {{- include "bigipreport.dataCollectorContainerSecurityContext" . | nindent 14 }}
          restartPolicy: Never
          volumes:
            - name: bigipreport-underlay
              persistentVolumeClaim:
                claimName: {{ include "bigipreport.pvcName" . }}
            - name: configuration
              configMap:
                name: {{ .Values.config.existingConfigMap | default (include "bigipreport.configMapName" .) }}
            - name: tmp
              emptyDir: {}
