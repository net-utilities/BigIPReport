name: Publish Linux release tarball

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-approval:
    runs-on: ubuntu-24.04
    environment: release
    steps:
      - name: Release approved
        run: echo "Environment 'release' approved; publishing Linux tarball."

  build-tarball:
    needs: release-approval
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Stage release tree and create archive
        id: archive
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          PKG="bigipreport-v${VERSION}"
          STAGING="dist/${PKG}"

          CONTRIB_SUBDIRS=(
            apache
            HelpScripts
            iis
            PoolStatusiRule
            ServeBrotliViaF5
          )

          rm -rf "$STAGING"
          mkdir -p "$STAGING/modules" "$STAGING/other" "$STAGING/underlay/json"

          cp "data-collector/bigipreport.ps1" "${STAGING}/${PKG}.ps1"
          cp "data-collector/bigipreportconfig.xml" "${STAGING}/bigipreportconfig.xml"
          cp -R data-collector/modules/. "${STAGING}/modules/"

          for subdir in "${CONTRIB_SUBDIRS[@]}"; do
            cp -R "contrib/${subdir}" "${STAGING}/other/${subdir}"
          done

          rsync -a \
            --exclude 'json' \
            --exclude 'cert.pem' \
            --exclude 'key.pem' \
            --exclude '.DS_Store' \
            frontend/underlay/ "${STAGING}/underlay/"
          touch "${STAGING}/underlay/json/.gitkeep"

          tar czf "${PKG}.tar.gz" -C dist "${PKG}"
          sha256sum "${PKG}.tar.gz" > SHA256SUMS
          echo "pkg=${PKG}" >> "${GITHUB_OUTPUT}"

      - name: Publish to GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PKG="${{ steps.archive.outputs.pkg }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release exists; uploading assets only (body unchanged)"
            gh release upload "$TAG" --clobber "${PKG}.tar.gz" SHA256SUMS
          else
            echo "Creating release with default install notes"
            NOTES_FILE="$(mktemp)"
            {
              echo '## Classic Linux install'
              echo ''
              printf 'Download `%s.tar.gz` and follow the installation guide:\n\n' "$PKG"
              echo 'https://loadbalancing.se/bigipreport-rest/'
            } >"$NOTES_FILE"
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file "$NOTES_FILE" \
              "${PKG}.tar.gz" SHA256SUMS
            rm -f "$NOTES_FILE"
          fi
