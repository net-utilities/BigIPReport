name: Package and publish Helm chart

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  release-approval:
    runs-on: ubuntu-24.04
    environment: release
    steps:
      - name: Release approved
        run: echo "Environment 'release' approved; publishing Helm chart."

  push-helm-chart:
    needs: release-approval
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Resolve chart version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Validate config source
        run: |
          if [[ ! -f "data-collector/bigipreportconfig.xml" ]]; then
            echo "Missing data-collector/bigipreportconfig.xml in repository."
            exit 1
          fi

      - name: Log in to ghcr.io
        run: |
          helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}"

      - name: Lint, package, and push chart
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cp data-collector/bigipreportconfig.xml helm/
          mkdir -p chart-dist
          helm lint helm/
          helm package helm/ --version "${VERSION}" --app-version "${VERSION}" --destination chart-dist/
          helm push "chart-dist/bigipreport-${VERSION}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"
